spring.application.name=prose
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

application.security.jwt.secret-key=${PROSE_JWT_SECRET:2B7E151628AED2A6ABF7158809CF4F3C2B7E151628AED2A6ABF7158809CF4F3C}
application.security.jwt.expiration=${PROSE_JWT_EXPIRATION:86400000}

spring.datasource.url=${PROSE_DB_URL:jdbc:postgresql://localhost:5432/mydatabase}
spring.datasource.username=${PROSE_DB_USERNAME:myuser}
spring.datasource.password=${PROSE_DB_PASSWORD:secret}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

server.port=${SERVER_PORT:8080}

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
