spring.application.name=prose
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

application.security.jwt.secret-key=${PROSE_JWT_SECRET}
application.security.jwt.expiration=${PROSE_JWT_EXPIRATION:86400000}

spring.datasource.url=${PROSE_DB_URL:jdbc:postgresql://localhost:5432/mydatabase}
spring.datasource.username=${PROSE_DB_USERNAME:myuser}
spring.datasource.password=${PROSE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

server.port=${SERVER_PORT:8080}
server.forward-headers-strategy=NATIVE

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

spring.data.web.pageable.default-page-size=100
spring.data.web.pageable.max-page-size=200

management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
